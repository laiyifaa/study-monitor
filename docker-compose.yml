# ==============================================================================
# Docker Compose 编排文件 —— 22中暑假网课学习进度监督系统
# ==============================================================================
# 用途：定义并编排生产环境的 4 个核心服务（backend / frontend / mysql / redis），
#       一键构建镜像、启动容器、建立网络互联和数据持久化。
# 在部署流程中的角色：
#   - 这是生产部署的入口文件，执行 `docker-compose up -d` 即可拉起全部服务；
#   - MySQL/Redis 的健康检查确保后端启动时数据层已就绪；
#   - Nginx 反向代理配置通过 volume 挂载进前端容器，由前端容器的 Nginx 统一代理 API。
# ==============================================================================

services:

  # --------------------------------------------------------------------------
  # 后端服务（FastAPI）
  # - 提供 REST API，处理业务逻辑（学习计时、进度统计、钉钉推送等）
  # - 依赖 MySQL（数据存储）和 Redis（心率限流 + 缓存）
  # --------------------------------------------------------------------------
  backend:
    build: ./backend                          # 使用 backend/ 目录下的 Dockerfile 构建镜像
    container_name: study-monitor-backend      # 固定容器名，方便日志查看和运维管理
    restart: unless-stopped                   # 容器异常退出时自动重启（手动 stop 后不重启）
    logging:
      driver: json-file                       # 使用 json-file 日志驱动（Docker 默认）
      options:
        max-size: "10m"                       # 单个日志文件最大 10MB，超出自动轮转
        max-file: "3"                         # 最多保留 3 个日志文件，总计最多 30MB
                                               # 防止长期运行日志无限增长占满磁盘
    ports:
      - "127.0.0.1:8001:8000"            # 宿主机8001→容器8000，仅本地访问（Nginx反代用）
    environment:
      # --- 钉钉开放平台凭据 ---
      # 用于钉钉免登、机器人推送等功能；敏感值从 .env 文件读取，不硬编码
      - DT_APP_KEY=${DT_APP_KEY}              # 钉钉应用 AppKey
      - DT_APP_SECRET=${DT_APP_SECRET}        # 钉钉应用 AppSecret
      - DT_CORP_ID=${DT_CORP_ID}              # 钉钉企业 CorpId
      - DT_ROBOT_WEBHOOK=${DT_ROBOT_WEBHOOK}  # 钉钉机器人 Webhook 地址（每日报告推送）
      - DT_ROBOT_SECRET=${DT_ROBOT_SECRET}    # 钉钉机器人加签密钥

      # --- MySQL 连接 ---
      # MYSQL_HOST 使用服务名 "mysql" 而非 IP，这是 Docker 网络内置 DNS 解析，
      # 只要 mysql 服务在同一 network 中，容器名即为域名
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=study_monitor              # 应用级用户，非 root，遵循最小权限原则
      - MYSQL_PASSWORD=${DB_PASSWORD:-study_monitor_2026}  # 优先从 .env 读取；缺省值仅用于本地开发
      - MYSQL_DATABASE=study_monitor          # 数据库名，与 MySQL 容器初始化时一致

      # --- Redis 连接 ---
      # Redis 用于心率限流（防刷接口）和缓存；无密码，因为仅在内部网络可访问
      - REDIS_HOST=redis                      # 同样使用 Docker 服务名
      - REDIS_PORT=6379

      # --- 安全与调试 ---
      - JWT_SECRET=${JWT_SECRET:-Please_change_this_to_random_string}  # JWT 签名密钥，生产务必替换
      - DEBUG=false                           # 生产环境关闭调试模式，避免泄露堆栈信息

      # --- CDN 加速 ---
      # 天翼云 CDN 加速域名，启用后本地视频通过 CDN 分发，降低源站带宽压力
      # 格式：https://cdn.your-domain.com，为空表示不使用 CDN（向后兼容）
      - CDN_DOMAIN=${CDN_DOMAIN:-}

      # --- 智能体批改 ---
      # 用于自动批改与答案解析；Compose 根 .env 只做变量替换，需显式注入容器
      - GRADING_AGENT_URL=${GRADING_AGENT_URL:-}
      - GRADING_AGENT_API_KEY=${GRADING_AGENT_API_KEY:-}

    volumes:
      # 将上传的视频文件挂载到后端容器，使 ops/storage API 能统计视频大小
      # 前端 Nginx 容器也需要此挂载（只读）用于视频分发
      - ./uploads:/app/uploads
      # 挂载 Docker socket，使后端容器能通过 Docker SDK 查询容器状态（运维面板用）
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy            # 等待 MySQL 健康检查通过后再启动，避免连接失败
      redis:
        condition: service_healthy            # 同理等待 Redis 就绪
    networks:
      - app-network                           # 所有服务加入同一网络，容器间可通过服务名互访

  # --------------------------------------------------------------------------
  # 前端服务（Nginx + Vue SPA）
  # - 构建产物为静态 HTML/JS/CSS，由 Nginx 托管
  # - Nginx 同时承担反向代理职责，将 /api 请求转发到后端
  # - 对外只暴露 80 端口，是整个系统的唯一入口
  # --------------------------------------------------------------------------
  frontend:
    build: ./frontend                         # 使用 frontend/ 目录下的 Dockerfile 构建镜像
    container_name: study-monitor-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:8080:80"              # 宿主机8080→容器80，仅本地访问（宿主机Nginx反代1001端口）
    volumes:
      # 将自定义 Nginx 配置挂载到容器内，覆盖默认配置
      # :ro 表示只读挂载，防止容器内进程意外修改主机配置文件
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # 将上传的视频文件挂载到前端 Nginx 容器，由 Nginx 直接分发视频（零拷贝高并发）
      # 这样视频请求不经过 FastAPI，Python GIL 不再成为瓶颈
      # :ro 只读，Nginx 只负责读取和分发，不写入
      - ./uploads:/app/uploads:ro
    depends_on:
      - backend                               # 依赖后端服务，确保启动顺序正确
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # MySQL 8.0 数据库
  # - 存储学生信息、学习记录、课程数据等业务数据
  # - 使用命名卷持久化数据，容器重建后数据不丢失
  # - 健康检查通过 mysqladmin ping 确认数据库可连接
  # --------------------------------------------------------------------------
  mysql:
    image: mysql:8.0                          # 官方 MySQL 8.0 镜像
    container_name: study-monitor-mysql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_change_me}  # root 密码，生产务必替换
      MYSQL_DATABASE: study_monitor           # 容器首次启动时自动创建此数据库
      MYSQL_USER: study_monitor               # 自动创建应用级用户
      MYSQL_PASSWORD: ${DB_PASSWORD:-study_monitor_2026}        # 应用用户密码，与 backend 中保持一致
    volumes:
      - mysql_data:/var/lib/mysql             # 命名卷持久化数据库文件，避免容器销毁后数据丢失
    healthcheck:
      # 使用 mysqladmin ping 检测 MySQL 是否可连接
      # 这是官方推荐的健康检查方式，比 TCP 端口检测更可靠（端口可达 ≠ 数据库就绪）
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s                           # 每 10 秒检测一次
      timeout: 5s                             # 单次检测超时 5 秒
      retries: 5                              # 连续 5 次失败才标记为 unhealthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Redis 7 缓存
  # - 心率限流：防止前端频繁轮询刷接口
  # - 缓存热点数据（如课程列表、统计汇总）
  # - 使用 alpine 镜像，体积更小（约 30MB vs 标准版 130MB）
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine                     # Alpine 版本，体积小、启动快，适合无磁盘IO的缓存场景
    container_name: study-monitor-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"                        # Redis 日志较少，5MB 足够
        max-file: "2"
    healthcheck:
      # redis-cli ping 返回 PONG 即表示服务正常
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data                      # 持久化 Redis 数据（RDB/AOF），防止限流计数器丢失
    networks:
      - app-network

# --------------------------------------------------------------------------
# 命名卷
# Docker 管理的持久化存储，数据在容器生命周期外独立存在
# --------------------------------------------------------------------------
volumes:
  mysql_data:                                 # MySQL 数据文件持久卷
  redis_data:                                 # Redis 持久化文件卷

# --------------------------------------------------------------------------
# 网络
# 所有服务共享同一 bridge 网络，容器间通过服务名即可互相访问
# 为什么用自定义网络而非默认 bridge：
#   - 默认 bridge 不支持服务名 DNS 解析，只能用 IP 或 --link（已弃用）
#   - 自定义 bridge 天然支持服务名互访，配置更简洁
# --------------------------------------------------------------------------
networks:
  app-network:
    driver: bridge                            # bridge 驱动，单机部署的标准选择
