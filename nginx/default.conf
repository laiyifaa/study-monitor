# ==============================================================================
# Nginx 反向代理配置 —— 22中暑假网课学习进度监督系统
# ==============================================================================
# 用途：作为前端容器的唯一 Web 服务器，承担两项职责：
#   1. 托管 Vue SPA 静态文件（HTML/JS/CSS）
#   2. 将 /api 请求反向代理到后端 FastAPI 服务（backend:8000）
# 在部署流程中的角色：
#   - 此文件通过 docker-compose.yml 的 volume 挂载进前端容器的
#     /etc/nginx/conf.d/default.conf，覆盖 Nginx 默认配置；
#   - 前端容器对外暴露 80 端口，Nginx 是整个系统的流量入口。
# 为什么前端容器需要 Nginx 而不是直接 serve 静态文件：
#   - SPA 需要 try_files 回退到 index.html（否则刷新页面 404）
#   - 统一入口：前端和 API 同域同端口，避免跨域问题
#   - gzip 压缩、安全头等在 Nginx 层统一处理
# ==============================================================================

server {
    listen 80;                                # 监听 HTTP 80 端口
    server_name _;                            # 通配所有域名；生产环境可替换为实际域名
    client_max_body_size 2000M;               # 允许上传最大2GB文件（视频上传）

    # --------------------------------------------------------------------------
    # 前端静态文件 —— Vue SPA 路由支持
    # --------------------------------------------------------------------------
    # 核心是 try_files 指令：
    #   1. 先尝试按 URI 精确匹配文件（$uri）      → /assets/logo.png 直接返回
    #   2. 再尝试按 URI 匹配目录（$uri/）          → 一般不命中
    #   3. 以上都不匹配则回退到 /index.html        → 交给 Vue Router 处理
    # 为什么这样配：Vue 使用 history 模式路由，/student/progress 等路径
    # 在服务器上并不存在对应文件，必须回退到 index.html 让前端 JS 解析路由
    # --------------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;            # 静态文件根目录，Vite 构建产物默认输出到此处
        index index.html;
        try_files $uri $uri/ /index.html;      # SPA 路由回退关键配置
    }

    # --------------------------------------------------------------------------
    # 视频文件分发 —— Nginx 直接服务，不走 FastAPI
    # --------------------------------------------------------------------------
    # 设计意图：
    #   800 人并发观看 1080p 视频约需 3.6Gbps 吞吐，FastAPI (Python GIL) 只能扛 ~200Mbps，
    #   改由 Nginx sendfile() 内核零拷贝直接分发，可轻松达到线速。
    #   同时 Nginx 原生支持 HTTP Range 请求，浏览器可拖动进度条。
    #
    # 性能参考（4核8G NVMe SSD + 4Gbps 带宽）：
    #   - 视频并发能力：~3.6Gbps（受限于带宽而非 CPU）
    #   - FastAPI CPU：从 100%（视频流量）降到 <5%（仅心跳/统计）
    #   - 磁盘 IO：Python 用户态拷贝 → 内核零拷贝（sendfile）
    # --------------------------------------------------------------------------
    location /uploads/videos/ {
        alias /app/uploads/videos/;            # 指向挂载的视频目录（docker-compose volume）
        mp4;                                    # 启用 mp4 流模块：支持伪流式（?start=秒数）
        mp4_buffer_size 1m;                    # MP4 元数据初始读取缓冲区，1MB 足以覆盖 moov atom
        mp4_max_buffer_size 5m;                # MP4 元数据最大缓冲区，大文件 moov atom 可达数 MB

        sendfile on;                            # 内核零拷贝：磁盘 → 内核缓冲区 → 网卡，不经过用户态
        tcp_nopush on;                          # 配合 sendfile，攒满一个 TCP 段再发送，减少小包
        tcp_nodelay on;                         # 确保数据不延迟发送（与 tcp_nopush 互补，发送阶段生效）

        # 文件缓存：热视频首次读磁盘后缓存在 OS page cache，后续请求直接命中内存
        open_file_cache max=200 inactive=30s;   # 缓存最多 200 个文件的 fd + 元数据，30秒无访问淘汰
        open_file_cache_valid 60s;              # 每 60 秒验证缓存项是否仍有效（文件是否被修改/删除）
        open_file_cache_min_uses 1;             # 只访问 1 次即进入缓存，适合"热门课程"场景
        open_file_cache_errors off;             # 不缓存 404 等错误（避免刚删除的文件仍被缓存为"存在"）

        # 有效期头：视频不常变，允许浏览器和中间层缓存，减少重复请求
        expires 7d;
        add_header Cache-Control "public, immutable";   # immutable：URL 不变则内容不变，无需再验证

        # ── CDN 回源兼容 ──
        # 天翼云 CDN 回源请求视频文件时，需要 CORS 头才能在浏览器中跨域播放
        # 同时添加 X-Cache 头便于调试 CDN 缓存命中情况
        add_header Access-Control-Allow-Origin "*";     # 允许任意域跨域访问视频资源（CDN 场景必需）
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";  # 允许的 HTTP 方法
        add_header Access-Control-Allow-Headers "Range";               # 允许 Range 请求头（视频拖动进度条）
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Cache";  # 暴露给前端 JS 的头

        # OPTIONS 预检请求处理：CDN 回源时浏览器可能先发 OPTIONS 请求
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # --------------------------------------------------------------------------
    # API 反向代理 —— 转发到后端 FastAPI
    # --------------------------------------------------------------------------
    # 将浏览器 /api/* 请求转发到后端容器的 /api/* 路径
    # 为什么用 proxy_pass 而不是 CORS：
    #   - 同域同端口，浏览器无跨域限制
    #   - 避免暴露后端端口，减少攻击面
    #   - Nginx 层可统一做限流、日志、缓存等中间层逻辑
    # --------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000/api/;   # backend 是 Docker 服务名，DNS 自动解析为容器 IP
        proxy_set_header Host $host;           # 传递原始 Host 头，后端可能用于生成回调 URL
        proxy_set_header X-Real-IP $remote_addr;          # 传递客户端真实 IP（非代理 IP）
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 追加代理链路 IP 列表
        proxy_set_header X-Forwarded-Proto $scheme;       # 传递原始协议（http/https）
        proxy_read_timeout 300s;               # 后端长耗时操作（如导出 Excel）需较长读取超时，
                                               # 默认 60s 不够用，设为 5 分钟
        proxy_connect_timeout 300s;            # 建立到后端的连接超时，同样放长以应对慢启动
    }

    # --------------------------------------------------------------------------
    # 健康检查端点
    # --------------------------------------------------------------------------
    # 外部监控（如 Docker HEALTHCHECK、负载均衡器）探测此路径判断服务是否存活
    # 复用后端的 /api/health，避免单独再写一个 Nginx 健康页
    # --------------------------------------------------------------------------
    location /health {
        proxy_pass http://backend:8000/api/health;
    }

    # --------------------------------------------------------------------------
    # Nginx 状态页 —— 运维监控获取连接数
    # --------------------------------------------------------------------------
    # 仅允许内网访问（127.0.0.1），外部无法查看
    # 运维面板通过后端 API 间接读取，不直接暴露
    # --------------------------------------------------------------------------
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;      # Docker 内网段
        deny all;
    }

    # --------------------------------------------------------------------------
    # Gzip 压缩
    # --------------------------------------------------------------------------
    # 开启 gzip 可将文本资源压缩 60-80%，显著减少传输体积，加快首屏加载
    # 为什么只压缩这些类型：图片（png/jpg）已自带压缩，再 gzip 反而更大
    # --------------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;                      # 小于 1KB 的响应不压缩，压缩收益抵不上 CPU 开销

    # --------------------------------------------------------------------------
    # 安全响应头
    # --------------------------------------------------------------------------
    # 三层防护，降低常见 Web 攻击风险：
    #   - X-Frame-Options:   防止页面被 iframe 嵌入（点击劫持防护）
    #   - X-Content-Type-Options: 阻止浏览器 MIME 嗅探（防止将上传文件误判为可执行脚本）
    #   - X-XSS-Protection:  启用浏览器内置 XSS 过滤器（旧浏览器兼容）
    # --------------------------------------------------------------------------
    add_header X-Frame-Options SAMEORIGIN;               # 只允许同源页面嵌入 iframe
    add_header X-Content-Type-Options nosniff;            # 严格遵循服务器声明的 Content-Type
    add_header X-XSS-Protection "1; mode=block";         # 检测到 XSS 攻击时阻止页面渲染
}
