# ==============================================================================
# 宿主机 Nginx 配置 — 在线学习平台 (:1001)
# ==============================================================================
# 用途：将宿主机 1001 端口的请求反代到 Docker 容器内的 frontend (127.0.0.1:8080)
# 安装方式：
#   sudo cp host-study-monitor.conf /etc/nginx/sites-available/study-monitor
#   sudo ln -sf /etc/nginx/sites-available/study-monitor /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 前提：
#   - docker-compose.yml 中 frontend 端口映射为 127.0.0.1:8080:80
#   - 防火墙/安全组已开放 1001 端口
#   - 此配置与其他服务（如 AIGate :1002）共用同一台宿主机 Nginx
# ==============================================================================

server {
    listen 1001;
    listen [::]:1001;
    server_name _;                                # 替换为实际域名（如 study.example.com）

    # ── 前端页面 + API 反代 ──
    # 复用容器内 Nginx 的所有逻辑（SPA路由、gzip、安全头等）
    # 宿主机 Nginx 只做一层简单反代
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 支持（Vite HMR 开发时需要，生产可留作兼容）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # ── 视频文件优化 ──
    # 视频请求需要更长的超时和流式传输支持
    # CDN 回源时也走这个路径
    location /uploads/videos/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 流式传输：不缓冲，直接透传
        proxy_buffering off;
        proxy_request_buffering off;

        # Range 请求支持（视频拖动进度条必需）
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # 视频文件可能较大，给更长的超时
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
    }
}
