# ==============================================================================
# Nginx HTTPS 配置模板 —— 天翼云 CDN 回源 + 前端 HTTPS
# ==============================================================================
# 用途：生产环境 HTTPS 配置，配合天翼云 CDN 使用
# 启用方式：
#   1. 将证书文件（fullchain.pem + privkey.pem）放到 nginx/ssl/ 目录
#   2. 在 docker-compose.yml 中挂载此文件和 ssl 目录
#   3. 重启 frontend 容器
#
# CDN 场景说明：
#   - CDN 边缘节点处理用户 HTTPS 请求（CDN 上配置证书）
#   - CDN 回源到源站时，可选择 HTTP 回源或 HTTPS 回源
#   - 如果 CDN 配置了 HTTPS 回源，则源站 Nginx 必须启用 HTTPS（使用本配置）
#   - 如果 CDN 配置了 HTTP 回源，则源站只需 default.conf 的 80 端口即可
#
# 证书来源：
#   - 免费证书：Let's Encrypt（自动续期）、天翼云免费证书（1年）
#   - 付费证书：天翼云 DigiCert 等
#   - ICP 备案后才能使用国内 CDN + 域名绑定
# ==============================================================================

# HTTP → HTTPS 重定向（CDN HTTP 回源时使用）
server {
    listen 80;
    server_name _;  # 替换为实际域名，如 study.example.com
    # 将所有 HTTP 请求 301 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl http2;                     # 启用 HTTP/2，提升多路复用性能
    server_name _;                             # 替换为实际域名

    # ── SSL 证书配置 ──
    # 证书文件路径（挂载自宿主机 nginx/ssl/ 目录）
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 协议与加密套件（现代安全标准）
    ssl_protocols TLSv1.2 TLSv1.3;             # 禁用 TLSv1.0/1.1（已不安全）
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # SSL 会话缓存（减少重复握手）
    ssl_session_cache shared:SSL:10m;          # 10MB 共享缓存，约 4 万个会话
    ssl_session_timeout 10m;                   # 会话超时 10 分钟
    ssl_session_tickets off;                   # 禁用 session tickets（前向安全）

    # HSTS（强制HTTPS，180天有效期）
    # 注意：首次启用时建议用短有效期（如 1d）测试，确认无问题后再延长
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # ── CDN 回源识别 ──
    # 天翼云 CDN 回源时会携带特定 Header，可用于区分直连用户和 CDN 回源请求
    # CDN 回源 IP 段需要在天翼云控制台查看并配置白名单
    # set $is_cdn_request 0;
    # if ($http_x_forwarded_for ~ "CDN_IP_1|CDN_IP_2") { set $is_cdn_request 1; }

    # ── 前端静态文件 ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── 视频文件分发 ──
    # 与 default.conf 保持一致，CDN 场景下此路径主要服务 CDN 回源请求
    location /uploads/videos/ {
        alias /app/uploads/videos/;
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        open_file_cache max=200 inactive=30s;
        open_file_cache_valid 60s;
        open_file_cache_min_uses 1;
        open_file_cache_errors off;

        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Cache";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── API 反向代理 ──
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;       # CDN 回源时传递 HTTPS 协议信息
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # ── 健康检查 ──
    location /health {
        proxy_pass http://backend:8000/api/health;
    }

    # ── Gzip 压缩 ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── 安全响应头 ──
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
}
